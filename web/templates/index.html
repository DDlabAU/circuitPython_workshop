<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Monitor</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; }
        h1 { color: #333; }
        .counter { font-size: 2em; font-weight: bold; color: #0064ff; margin: 20px 0; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
</head>
<body>

<h1>Air Quality Monitor</h1>

<p>Button presses: <span class="counter" id="button-count">-</span></p>

<table>
    <thead>
        <tr>
            <th>Timestamp</th>
            <th>TVOC (ppb)</th>
            <th>eCO2 (ppm)</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td id="timestamp">-</td>
            <td id="tvoc">-</td>
            <td id="eco2">-</td>
        </tr>
    </tbody>
</table>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
